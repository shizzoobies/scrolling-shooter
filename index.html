<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#03030a">
  <link rel="manifest" href="manifest.json">
  <title>Scrolling Shooter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <!-- Mobile controls (pause + mute) -->
  <div id="mobile-controls">
    <button id="muteBtn"  aria-label="Toggle music">🔊</button>
    <button id="pauseBtn" aria-label="Pause game">⏸</button>
  </div>

  <!-- Landscape rotation hint -->
  <div id="rotate-hint">
    <div class="icon">📱</div>
    <div>Rotate your device</div>
    <div class="sub">portrait mode plays best</div>
  </div>

  <!-- Leaderboard overlay -->
  <div id="lb-overlay" class="hidden">
    <div id="lb-panel">
      <div id="lb-header">
        <h2>LEADERBOARD</h2>
        <button id="lb-close" aria-label="Close">✕</button>
      </div>

      <div id="lb-name-row" class="hidden">
        <div id="lb-name-label">ENTER YOUR NAME</div>
        <div id="lb-name-input-wrap">
          <input id="lb-name-input" type="text" maxlength="12" placeholder="AAA" autocomplete="off" autocorrect="off" spellcheck="false">
          <button id="lb-submit" class="lb-btn accent">SUBMIT</button>
        </div>
        <span id="lb-submit-status"></span>
      </div>

      <div id="lb-table-wrap">
        <div id="lb-loading">Loading scores…</div>
        <table id="lb-table" class="hidden">
          <thead><tr><th>#</th><th>Player</th><th>Score</th><th>Wave</th></tr></thead>
          <tbody id="lb-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="game.js?v=7"></script>
</body>
</html>
